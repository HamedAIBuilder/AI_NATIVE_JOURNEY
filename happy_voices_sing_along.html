<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 Happy Voices Sing-Along! 🎤</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            margin: 0;
            padding: 10px;
            min-height: 100vh;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background elements */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="20" cy="20" r="2" fill="rgba(255,255,255,0.1)"/><circle cx="80" cy="40" r="1.5" fill="rgba(255,255,255,0.1)"/><circle cx="40" cy="80" r="1" fill="rgba(255,255,255,0.1)"/></svg>');
            animation: float 20s infinite linear;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            100% { transform: translateY(-100px) rotate(360deg); }
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.2);
            text-align: center;
            width: 95%;
            max-width: 1200px;
            position: relative;
            overflow: hidden;
            margin: 10px;
            display: flex;
            flex-direction: row;
            gap: 20px;
            align-items: stretch;
        }

        .left-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 300px;
        }

        .right-panel {
            flex: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            animation: shine 3s infinite;
            pointer-events: none;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        h1 {
            color: #ff6b6b;
            font-size: clamp(1.8em, 3vw, 2.5em);
            margin-bottom: 10px;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.3);
            background: linear-gradient(45deg, #ff6b6b, #ee5a24, #ff9ff3);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease-in-out infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .subtitle {
            color: #4ecdc4;
            font-size: clamp(0.9em, 2vw, 1.2em);
            margin-bottom: 15px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
        }

        .song-selector {
            margin: 15px 0;
            padding: 15px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .song-selector label {
            color: white;
            font-size: clamp(0.9em, 2vw, 1.1em);
            font-weight: bold;
            margin-bottom: 8px;
            display: block;
        }

        select {
            width: 100%;
            padding: 10px 15px;
            font-size: clamp(0.8em, 1.8vw, 1em);
            border-radius: 12px;
            border: 3px solid #3498db;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .controls {
            margin: 15px 0;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            color: white;
            border: none;
            padding: clamp(10px, 2vw, 15px) clamp(15px, 3vw, 25px);
            font-size: clamp(0.8em, 2vw, 1.1em);
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            font-weight: bold;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            min-width: 100px;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(-1px) scale(1.02);
        }

        button:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            transform: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .progress-container {
            margin: 15px 0;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .progress-bar {
            width: 100%;
            height: 15px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(45deg, #2ecc71, #27ae60, #16a085);
            width: 0%;
            transition: width 0.5s ease;
            border-radius: 10px;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            animation: progressShine 2s infinite;
        }

        @keyframes progressShine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .lyrics-display {
            background: linear-gradient(45deg, #ffecd2, #fcb69f, #ff9a9e);
            border-radius: 20px;
            padding: 20px;
            margin: 15px 0;
            min-height: 200px;
            max-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            font-size: clamp(1.1em, 2.5vw, 1.4em);
            font-weight: bold;
            color: #2c3e50;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            border: 3px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .lyrics-container {
            display: flex;
            flex-direction: column;
            transition: transform 0.5s ease;
            min-height: 100%;
        }

        .lyric-line {
            padding: 8px 0;
            margin: 2px 0;
            border-radius: 10px;
            transition: all 0.3s ease;
            opacity: 0.7;
            transform: scale(0.95);
        }

        .lyric-line.current {
            opacity: 1;
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.3);
            padding: 12px 15px;
            margin: 5px 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .lyric-line.completed {
            opacity: 0.8;
            transform: scale(1);
        }

        .cheer-display {
            background: linear-gradient(45deg, #a8edea, #fed6e3, #ffecd2);
            border-radius: 15px;
            padding: 12px;
            margin: 10px 0;
            font-size: clamp(0.9em, 2vw, 1.2em);
            color: #e74c3c;
            font-weight: bold;
            opacity: 0;
            transition: all 0.5s ease;
            transform: scale(0.8);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .cheer-display.show {
            opacity: 1;
            transform: scale(1);
        }

        .emoji {
            font-size: 1.8em;
            margin: 0 8px;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        .music-notes {
            position: absolute;
            font-size: 2em;
            color: rgba(255, 255, 255, 0.3);
            animation: floatNote 4s infinite linear;
            pointer-events: none;
        }

        .music-notes:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; }
        .music-notes:nth-child(2) { top: 20%; right: 15%; animation-delay: 1s; }
        .music-notes:nth-child(3) { bottom: 30%; left: 20%; animation-delay: 2s; }
        .music-notes:nth-child(4) { bottom: 20%; right: 10%; animation-delay: 3s; }

        @keyframes floatNote {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }

        /* Landscape-first responsive design */
        @media (max-width: 1024px) {
            .container {
                flex-direction: column;
                max-width: 900px;
                gap: 15px;
            }
            
            .left-panel, .right-panel {
                min-width: auto;
            }
            
            .lyrics-display {
                min-height: 150px;
                max-height: 250px;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 5px;
            }
            
            .container {
                width: 98%;
                padding: 15px;
                margin: 5px;
                border-radius: 15px;
                flex-direction: column;
            }
            
            .back-home-btn {
                position: relative;
                top: auto;
                left: auto;
                margin-bottom: 15px;
                align-self: flex-start;
            }
            
            .controls {
                flex-direction: row;
                gap: 10px;
            }
            
            button {
                width: auto;
                max-width: none;
            }
            
            .lyrics-display {
                min-height: 120px;
                max-height: 200px;
                padding: 15px;
                font-size: clamp(1em, 3vw, 1.3em);
            }
            
            .song-selector {
                padding: 12px;
            }
            
            .progress-container {
                padding: 12px;
            }
        }

        @media (max-width: 480px) {
            .container {
                width: 100%;
                padding: 10px;
                margin: 0;
                border-radius: 10px;
                flex-direction: column;
            }
            
            h1 {
                font-size: clamp(1.5em, 4vw, 2em);
            }
            
            .subtitle {
                font-size: clamp(0.8em, 3vw, 1em);
            }
            
            .lyrics-display {
                min-height: 100px;
                max-height: 150px;
                padding: 12px;
                font-size: clamp(0.9em, 3.5vw, 1.2em);
            }
            
            .cheer-display {
                padding: 10px;
                font-size: clamp(0.8em, 2.5vw, 1em);
            }
            
            .song-selector {
                padding: 10px;
            }
            
            .song-selector label {
                font-size: clamp(0.8em, 2.5vw, 1em);
            }
            
            select {
                padding: 8px 12px;
                font-size: clamp(0.7em, 2.5vw, 0.9em);
            }
            
            button {
                padding: 8px 15px;
                font-size: clamp(0.8em, 2.5vw, 1em);
                min-width: 80px;
            }
        }

        /* Portrait orientation override for mobile */
        @media (max-width: 768px) and (orientation: portrait) {
            .container {
                flex-direction: column;
                max-width: 500px;
            }
            
            .lyrics-display {
                min-height: 150px;
                max-height: 200px;
            }
            
            .controls {
                flex-direction: column;
                align-items: center;
            }
            
            button {
                width: 100%;
                max-width: 250px;
            }
        }

        /* High DPI displays */
        @media (-webkit-min-device-pixel-ratio: 2), (min-resolution: 192dpi) {
            .container {
                border-radius: 25px;
            }
            
            button {
                border-radius: 25px;
            }
        }

        /* Touch-friendly improvements */
        @media (hover: none) and (pointer: coarse) {
            button {
                min-height: 44px;
                min-width: 44px;
            }
            
            select {
                min-height: 44px;
            }
            
            .back-home-btn {
                min-height: 44px;
                min-width: 44px;
            }
        }

        .back-home-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            background: linear-gradient(45deg, #4ecdc4, #ff6b6b);
            color: white;
            border: none;
            padding: 6px 15px;
            font-size: clamp(0.7em, 1.8vw, 0.9em);
            border-radius: 15px;
            cursor: pointer;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
            z-index: 10;
        }
        .back-home-btn:hover {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        /* Interactive hover effects */
        select:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            border-color: #e74c3c;
        }

        select:focus {
            outline: none;
            border-color: #e74c3c;
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.3);
            animation: buttonPulse 0.6s ease-in-out;
        }

        button:active {
            transform: translateY(-1px) scale(1.02);
            animation: buttonClick 0.2s ease-in-out;
        }

        @keyframes buttonPulse {
            0%, 100% { transform: translateY(-3px) scale(1.05); }
            50% { transform: translateY(-3px) scale(1.08); }
        }

        @keyframes buttonClick {
            0% { transform: translateY(-1px) scale(1.02); }
            50% { transform: translateY(-1px) scale(0.98); }
            100% { transform: translateY(-1px) scale(1.02); }
        }

        /* Interactive lyrics display */
        .lyrics-display {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .lyrics-display:hover {
            transform: scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .lyric-line {
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .lyric-line:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.4);
            padding: 15px 20px;
            margin: 8px 0;
            border-radius: 15px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        .lyric-line.current {
            animation: currentLineGlow 2s ease-in-out infinite;
        }

        @keyframes currentLineGlow {
            0%, 100% { 
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
                transform: scale(1.05);
            }
            50% { 
                box-shadow: 0 8px 25px rgba(255, 255, 255, 0.3);
                transform: scale(1.08);
            }
        }

        /* Interactive progress bar */
        .progress-bar {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .progress-bar:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .progress-fill {
            position: relative;
            cursor: pointer;
        }

        .progress-fill::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.6), transparent);
            animation: progressShine 2s infinite;
            border-radius: 10px;
        }

        /* Interactive song selector */
        .song-selector {
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .song-selector:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
        }

        /* Interactive cheer display */
        .cheer-display {
            cursor: pointer;
            transition: all 0.5s ease;
        }

        .cheer-display:hover {
            transform: scale(1.05) rotate(2deg);
        }

        .cheer-display.show {
            animation: cheerBounce 0.8s ease-in-out;
        }

        @keyframes cheerBounce {
            0% { transform: scale(0.8) rotate(-5deg); }
            50% { transform: scale(1.1) rotate(5deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        /* Interactive back button */
        .back-home-btn:hover {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            animation: backButtonGlow 1s ease-in-out infinite;
        }

        @keyframes backButtonGlow {
            0%, 100% { box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2); }
            50% { box-shadow: 0 8px 25px rgba(255, 255, 255, 0.3); }
        }

        /* Particle effects */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            animation: floatParticle 3s ease-in-out infinite;
        }

        @keyframes floatParticle {
            0% { 
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { 
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        /* Interactive title */
        h1:hover {
            transform: scale(1.05);
            animation: titleRainbow 2s ease-in-out infinite;
        }

        @keyframes titleRainbow {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        /* Interactive subtitle */
        .subtitle:hover {
            transform: scale(1.1);
            color: #ff6b6b;
        }

        /* Loading animation */
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.show {
            display: block;
            animation: loadingPulse 1s ease-in-out infinite;
        }

        @keyframes loadingPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Success animation */
        .success-animation {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(46, 204, 113, 0.9);
            color: white;
            padding: 20px 40px;
            border-radius: 20px;
            font-size: 1.5em;
            font-weight: bold;
            z-index: 1000;
            display: none;
            animation: successPop 0.5s ease-in-out;
        }

        .success-animation.show {
            display: block;
        }

        @keyframes successPop {
            0% { transform: translate(-50%, -50%) scale(0); }
            50% { transform: translate(-50%, -50%) scale(1.2); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        /* Interactive container */
        .container:hover {
            transform: scale(1.01);
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.4);
        }

        /* Music note animations */
        .music-notes:hover {
            transform: scale(1.5) rotate(15deg);
            animation: musicNoteBounce 0.5s ease-in-out;
        }

        @keyframes musicNoteBounce {
            0%, 100% { transform: scale(1.5) rotate(15deg); }
            50% { transform: scale(1.8) rotate(30deg); }
        }

        /* Interactive panels */
        .left-panel:hover {
            transform: translateX(5px);
        }

        .right-panel:hover {
            transform: translateX(-5px);
        }

        /* Ripple effect for buttons */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.6);
            transform: scale(0);
            animation: ripple 0.6s linear;
            pointer-events: none;
        }

        @keyframes ripple {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <!-- Floating music notes -->
    <div class="music-notes">🎵</div>
    <div class="music-notes">🎶</div>
    <div class="music-notes">🎤</div>
    <div class="music-notes">🎸</div>

    <div class="particles" id="particles"></div>
    <div class="success-animation" id="successAnimation">🎉 Great singing! 🎉</div>
    
    <div class="container">
        <div class="header">
            <h1>🎵 Happy Voices Sing-Along! 🎵</h1>
            <p class="subtitle">Let's make music together!</p>
        </div>

        <div class="main-content">
            <div class="left-panel">
                <div class="controls">
                    <div class="control-group">
                        <label for="songSelect">Choose a Song:</label>
                        <select id="songSelect" class="song-selector">
                            <option value="">Select a song...</option>
                        </select>
                    </div>

                    <div class="control-group">
                        <button id="startBtn" class="control-btn">🎤 Start Singing!</button>
                        <button id="pauseBtn" class="control-btn">⏸️ Pause</button>
                        <button id="stopBtn" class="control-btn">⏹️ Stop</button>
                    </div>

                    <div class="control-group">
                        <button id="cheerBtn" class="control-btn">🎉 Give Cheer!</button>
                        <button id="backHomeBtn" class="control-btn back-home-btn">🏠 Back to Home</button>
                    </div>

                    <div class="progress-container">
                        <div class="progress-bar" id="progressBar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                        <div class="progress-text" id="progressText">0%</div>
                    </div>

                    <div class="loading" id="loading">🎵 Loading song... 🎵</div>
                </div>

                <div class="cheer-display" id="cheerDisplay"></div>

        const COLORS = [
            '#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#feca57', '#ff9ff3', '#54a0ff', '#5f27cd'
        ];

        let currentInterval;
        let currentLyricIndex = 0;
        // let isPlaying = false; // Removed to avoid redeclaration

        function loadSongLyrics(songTitle = null) {
            if (songTitle === null) {
                songTitle = Object.keys(SONGS)[0];
            }
            return SONGS[songTitle];
        }

        function generateCheer() {
            return CHEERS[Math.floor(Math.random() * CHEERS.length)];
        }

        function getRandomColor() {
            return COLORS[Math.floor(Math.random() * COLORS.length)];
        }

        function displayLyricsWithPacing(lyricsList, pauseSeconds = 2000) {
            const lyricsContainer = document.getElementById('lyricsContainer');
            const cheerDisplay = document.getElementById('cheerDisplay');
            const progressFill = document.getElementById('progressFill');
            
            currentLyricIndex = 0;
            
            // Clear previous lyrics and initialize
            lyricsContainer.innerHTML = '';
            
            // Pre-populate with empty lines for spacing
            for (let i = 0; i < 5; i++) {
                const emptyLine = document.createElement('div');
                emptyLine.className = 'lyric-line';
                emptyLine.textContent = '';
                lyricsContainer.appendChild(emptyLine);
            }
            
            function showNextLine() {
                if (currentLyricIndex < lyricsList.length && isPlaying) {
                    const currentLine = lyricsList[currentLyricIndex];
                    
                    // Skip empty lines but still count them
                    if (currentLine.trim() === '') {
                        currentLyricIndex++;
                        if (currentLyricIndex < lyricsList.length) {
                            currentInterval = setTimeout(showNextLine, 500); // Shorter pause for empty lines
                        } else {
                            finishSong();
                        }
                        return;
                    }
                    
                    // Create new lyric line element
                    const lyricLine = document.createElement('div');
                    lyricLine.className = 'lyric-line current';
                    lyricLine.textContent = currentLine;
                    lyricLine.style.color = getRandomColor();
                    
                    // Add to container
                    lyricsContainer.appendChild(lyricLine);
                    
                    // Update progress
                    const progress = ((currentLyricIndex + 1) / lyricsList.length) * 100;
                    progressFill.style.width = progress + '%';
                    
                    // Scroll to show the new line
                    setTimeout(() => {
                        lyricLine.scrollIntoView({ behavior: 'smooth', block: 'end' });
                    }, 100);
                    
                    // Show cheer after a short delay
                    setTimeout(() => {
                        if (isPlaying) {
                            cheerDisplay.textContent = generateCheer();
                            cheerDisplay.style.color = lyricLine.style.color;
                            cheerDisplay.classList.add('show');
                            
                            // Hide cheer after 1.2 seconds
                            setTimeout(() => {
                                cheerDisplay.classList.remove('show');
                            }, 1200);
                        }
                    }, 1000);
                    
                    // Mark current line as completed after a delay
                    setTimeout(() => {
                        lyricLine.classList.remove('current');
                        lyricLine.classList.add('completed');
                    }, 1500);
                    
                    currentLyricIndex++;
                    
                    // Schedule next line
                    if (currentLyricIndex < lyricsList.length) {
                        currentInterval = setTimeout(showNextLine, pauseSeconds);
                    } else {
                        finishSong();
                    }
                }
            }
            
            function finishSong() {
                setTimeout(() => {
                    if (isPlaying) {
                        // Get user name for personalization
                        const userName = localStorage.getItem('userName') || 'Friend';
                        
                        // Final progress update
                        progressFill.style.width = '100%';
                        
                        // Show completion message
                        const completionLine = document.createElement('div');
                        completionLine.className = 'lyric-line current';
                        completionLine.textContent = `🎉 Great job, ${userName}! You finished the song! You're a singing superstar! 🌈🎶`;
                        completionLine.style.color = '#2ecc71';
                        completionLine.style.fontSize = '1.2em';
                        lyricsContainer.appendChild(completionLine);
                        
                        // Show final celebration
                        cheerDisplay.textContent = `🎉 CONGRATULATIONS, ${userName}! 🎉`;
                        cheerDisplay.style.color = '#e74c3c';
                        cheerDisplay.classList.add('show');
                        
                        // Keep final cheer visible longer
                        setTimeout(() => {
                            cheerDisplay.classList.remove('show');
                            
                            // Reset controls after celebration
                            setTimeout(() => {
                                document.getElementById('startBtn').disabled = false;
                                document.getElementById('stopBtn').disabled = true;
                                isPlaying = false;
                                
                                // Reset display for next song
                                lyricsContainer.innerHTML = `<div class="lyric-line">Ready to sing another song, ${userName}? Click "Start Singing!" to begin! 🎶</div>`;
                            }, 1000);
                        }, 3000);
                    }
                }, 1000);
            }
            
            showNextLine();
        }

        function startSingAlong() {
            const songSelect = document.getElementById('songSelect');
            const selectedSong = songSelect.value;
            const lyrics = loadSongLyrics(selectedSong);
            
            // Get user data for personalization
            const userName = localStorage.getItem('userName') || 'Friend';
            const userAge = localStorage.getItem('userAge') || '5';
            const pacing = getPacingForAge(parseInt(userAge));
            
            isPlaying = true;
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            
            // Reset progress
            document.getElementById('progressFill').style.width = '0%';
            
            // Use personalized pacing
            displayLyricsWithPacing(lyrics, pacing);
        }

        function stopSingAlong() {
            isPlaying = false;
            if (currentInterval) {
                clearTimeout(currentInterval);
            }
            
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            
            const lyricsContainer = document.getElementById('lyricsContainer');
            const cheerDisplay = document.getElementById('cheerDisplay');
            
            lyricsContainer.innerHTML = '<div class="lyric-line">Ready to sing? Click "Start Singing!" to begin! 🎶</div>';
            cheerDisplay.classList.remove('show');
            
            // Reset progress
            document.getElementById('progressFill').style.width = '0%';
        }

        // Add interactive hover effects
        document.addEventListener('DOMContentLoaded', function() {
            const buttons = document.querySelectorAll('button');
            buttons.forEach(button => {
                button.addEventListener('mouseenter', function() {
                    this.style.transform = 'translateY(-3px) scale(1.05)';
                });
                button.addEventListener('mouseleave', function() {
                    if (!this.disabled) {
                        this.style.transform = 'translateY(0) scale(1)';
                    }
                });
            });
            
            // Initialize personalized experience
            main_sing_along_loop();
        });

        // 4. Orchestrator
        function main_sing_along_loop() {
            /**
             * Coordinates the sing-along experience.
             */
            // Get user data from localStorage
            const userName = localStorage.getItem('userName') || 'Friend';
            const userAge = localStorage.getItem('userAge') || '5';
            const musicGenre = localStorage.getItem('musicGenre') || 'all-songs';
            
            // Personalize the welcome message
            const welcomeMessage = `Welcome back, ${userName}! Let's sing together and have fun! 🌟`;
            document.querySelector('.subtitle').textContent = welcomeMessage;
            
            // Filter songs based on genre preference
            const filteredSongs = filterSongsByGenre(musicGenre);
            updateSongSelector(filteredSongs);
            
            // Adjust pacing based on age
            const pacing = getPacingForAge(parseInt(userAge));
            
            // Display personalized welcome
            console.log(`Welcome ${userName} (age ${userAge})! Genre: ${musicGenre}`);
        }

        function filterSongsByGenre(genre) {
            const genreMap = {
                'nursery-rhymes': ['Twinkle, Twinkle, Little Star', 'Baa Baa Black Sheep', 'Mary Had a Little Lamb', 'The Itsy Bitsy Spider'],
                'action-songs': ['If You\'re Happy and You Know It', 'Head, Shoulders, Knees and Toes'],
                'counting-songs': ['Five Little Ducks', 'Five Little Monkeys'],
                'educational-songs': ['The Alphabet Song', 'Head, Shoulders, Knees and Toes'],
                'animal-songs': ['Old MacDonald Had a Farm', 'Five Little Ducks', 'Five Little Monkeys'],
                'pop-songs': ['Happy (Kid Version)', 'Can\'t Stop the Feeling (Kid Version)', 'Shake It Off (Kid Version)', 'Shape of You (Kid Version)'],
                'rnb-songs': ['Uptown Funk (Kid Version)', 'Can\'t Stop the Feeling (Kid Version)', 'Shape of You (Kid Version)'],
                'hip-hop-songs': ['Uptown Funk (Kid Version)', 'Happy (Kid Version)', 'Shake It Off (Kid Version)'],
                'afro-music': ['Waka Waka (Kid Version)', 'Happy (Kid Version)', 'Can\'t Stop the Feeling (Kid Version)'],
                'reggae-songs': ['One Love (Kid Version)', 'Three Little Birds (Kid Version)'],
                'reggaeton-songs': ['Despacito (Kid Version)', 'Shape of You (Kid Version)'],
                'all-songs': Object.keys(SONGS)
            };
            
            return genreMap[genre] || Object.keys(SONGS);
        }

        function updateSongSelector(availableSongs) {
            const songSelect = document.getElementById('songSelect');
            songSelect.innerHTML = '';
            
            availableSongs.forEach(songTitle => {
                const option = document.createElement('option');
                option.value = songTitle;
                option.textContent = songTitle;
                songSelect.appendChild(option);
            });
        }

        function getPacingForAge(age) {
            if (age < 5) return 3000; // Slower for very young kids
            if (age < 8) return 2500; // Medium pace for young kids
            if (age < 12) return 2000; // Normal pace for older kids
            return 1500; // Faster for teens and adults
        }

        // Interactive features
        let particles = [];
        let isPlaying = false;
        let currentSong = null;
        let currentLineIndex = 0;
        let cheerInterval = null;
        let particleInterval = null;

        // Initialize interactive features
        function initializeInteractivity() {
            createParticles();
            addRippleEffects();
            addClickSounds();
            addHoverEffects();
            setupProgressBarInteraction();
        }

        // Create floating particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 3 + 's';
                particle.style.animationDuration = (Math.random() * 2 + 2) + 's';
                particlesContainer.appendChild(particle);
            }
        }

        // Add ripple effect to buttons
        function addRippleEffects() {
            const buttons = document.querySelectorAll('button');
            buttons.forEach(button => {
                button.addEventListener('click', function(e) {
                    const ripple = document.createElement('span');
                    ripple.className = 'ripple';
                    const rect = this.getBoundingClientRect();
                    const size = Math.max(rect.width, rect.height);
                    const x = e.clientX - rect.left - size / 2;
                    const y = e.clientY - rect.top - size / 2;
                    ripple.style.width = ripple.style.height = size + 'px';
                    ripple.style.left = x + 'px';
                    ripple.style.top = y + 'px';
                    this.appendChild(ripple);
                    setTimeout(() => ripple.remove(), 600);
                });
            });
        }

        // Add click sound effects
        function addClickSounds() {
            const buttons = document.querySelectorAll('button');
            buttons.forEach(button => {
                button.addEventListener('click', function() {
                    playClickSound();
                    showSuccessAnimation();
                });
            });
        }

        // Play click sound (using Web Audio API)
        function playClickSound() {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(400, audioContext.currentTime + 0.1);
                
                gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.1);
            } catch (e) {
                console.log('Audio not supported');
            }
        }

        // Show success animation
        function showSuccessAnimation() {
            const successAnim = document.getElementById('successAnimation');
            successAnim.classList.add('show');
            setTimeout(() => {
                successAnim.classList.remove('show');
            }, 2000);
        }

        // Add hover effects
        function addHoverEffects() {
            const lyricLines = document.querySelectorAll('.lyric-line');
            lyricLines.forEach(line => {
                line.addEventListener('mouseenter', function() {
                    this.style.transform = 'scale(1.05)';
                });
                line.addEventListener('mouseleave', function() {
                    this.style.transform = 'scale(1)';
                });
            });
        }

        // Setup progress bar interaction
        function setupProgressBarInteraction() {
            const progressBar = document.getElementById('progressBar');
            progressBar.addEventListener('click', function(e) {
                if (currentSong && isPlaying) {
                    const rect = this.getBoundingClientRect();
                    const clickX = e.clientX - rect.left;
                    const percentage = (clickX / rect.width) * 100;
                    seekToPercentage(percentage);
                }
            });
        }

        // Seek to specific percentage in song
        function seekToPercentage(percentage) {
            if (currentSong && currentSong.lyrics) {
                const totalLines = currentSong.lyrics.length;
                const targetLine = Math.floor((percentage / 100) * totalLines);
                currentLineIndex = Math.max(0, Math.min(targetLine, totalLines - 1));
                displayLyrics();
                updateProgressBar();
            }
        }

        // Enhanced start singing function
        function startSinging() {
            const selectedSong = document.getElementById('songSelect').value;
            if (!selectedSong) {
                showMessage('Please select a song first!', 'error');
                return;
            }

            currentSong = SONGS[selectedSong];
            isPlaying = true;
            currentLineIndex = 0;
            
            showLoading(true);
            
            setTimeout(() => {
                showLoading(false);
                displayLyrics();
                startLyricProgression();
                startCheerInterval();
                showMessage(`🎵 Starting ${selectedSong}! 🎵`, 'success');
            }, 1000);
        }

        // Show loading state
        function showLoading(show) {
            const loading = document.getElementById('loading');
            if (show) {
                loading.classList.add('show');
            } else {
                loading.classList.remove('show');
            }
        }

        // Enhanced pause function
        function pauseSinging() {
            isPlaying = false;
            if (cheerInterval) {
                clearInterval(cheerInterval);
                cheerInterval = null;
            }
            showMessage('⏸️ Singing paused!', 'info');
        }

        // Enhanced stop function
        function stopSinging() {
            isPlaying = false;
            currentLineIndex = 0;
            if (cheerInterval) {
                clearInterval(cheerInterval);
                cheerInterval = null;
            }
            displayLyrics();
            updateProgressBar();
            showMessage('⏹️ Singing stopped!', 'info');
        }

        // Enhanced cheer function
        function giveCheer() {
            const cheerDisplay = document.getElementById('cheerDisplay');
            const cheer = CHEERS[Math.floor(Math.random() * CHEERS.length)];
            
            cheerDisplay.textContent = cheer;
            cheerDisplay.classList.add('show');
            
            // Add particle burst
            createParticleBurst();
            
            setTimeout(() => {
                cheerDisplay.classList.remove('show');
            }, 2000);
        }

        // Create particle burst effect
        function createParticleBurst() {
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 10; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = '50%';
                particle.style.top = '50%';
                particle.style.animation = `particleBurst 1s ease-out forwards`;
                particlesContainer.appendChild(particle);
                
                setTimeout(() => particle.remove(), 1000);
            }
        }

        // Enhanced lyric progression
        function startLyricProgression() {
            if (!isPlaying || !currentSong) return;
            
            const totalLines = currentSong.length;
            const duration = 60; // Default 60 seconds
            const interval = (duration * 1000) / totalLines;
            
            cheerInterval = setInterval(() => {
                if (isPlaying && currentLineIndex < totalLines - 1) {
                    currentLineIndex++;
                    displayLyrics();
                    updateProgressBar();
                    
                    // Add interactive feedback
                    highlightCurrentLine();
                    
                    // Random cheer chance
                    if (Math.random() < 0.1) {
                        giveCheer();
                    }
                } else if (currentLineIndex >= totalLines - 1) {
                    stopSinging();
                    showMessage('🎉 Song completed! Great singing! 🎉', 'success');
                }
            }, interval);
        }

        // Highlight current line with animation
        function highlightCurrentLine() {
            const lyricLines = document.querySelectorAll('.lyric-line');
            lyricLines.forEach((line, index) => {
                line.classList.remove('current');
                if (index === currentLineIndex) {
                    line.classList.add('current');
                    line.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            });
        }

        // Enhanced progress bar update
        function updateProgressBar() {
            if (!currentSong) return;
            
            const totalLines = currentSong.length;
            const progress = (currentLineIndex / (totalLines - 1)) * 100;
            
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            
            progressFill.style.width = progress + '%';
            progressText.textContent = Math.round(progress) + '%';
        }

        // Enhanced message display
        function showMessage(message, type = 'info') {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = message;
            messageDiv.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: ${type === 'success' ? '#2ecc71' : type === 'error' ? '#e74c3c' : '#3498db'};
                color: white;
                padding: 15px 25px;
                border-radius: 10px;
                font-weight: bold;
                z-index: 1000;
                animation: slideIn 0.5s ease-out;
            `;
            
            document.body.appendChild(messageDiv);
            
            setTimeout(() => {
                messageDiv.style.animation = 'slideOut 0.5s ease-in';
                setTimeout(() => messageDiv.remove(), 500);
            }, 3000);
        }

        // Enhanced lyrics display
        function displayLyrics() {
            const lyricsDisplay = document.getElementById('lyricsDisplay');
            
            if (!currentSong) {
                lyricsDisplay.innerHTML = '<p>Select a song to start singing!</p>';
                return;
            }
            
            let html = '';
            currentSong.forEach((line, index) => {
                const isCurrent = index === currentLineIndex;
                const className = isCurrent ? 'lyric-line current' : 'lyric-line';
                html += `<div class="${className}" data-index="${index}">${line}</div>`;
            });
            
            lyricsDisplay.innerHTML = html;
            addHoverEffects();
        }

        // Start cheer interval
        function startCheerInterval() {
            if (cheerInterval) clearInterval(cheerInterval);
            
            cheerInterval = setInterval(() => {
                if (isPlaying && Math.random() < 0.05) {
                    giveCheer();
                }
            }, 5000);
        }

        // Initialize everything when page loads
        document.addEventListener('DOMContentLoaded', function() {
            populateSongSelect();
            initializeInteractivity();
            
            // Add event listeners
            document.getElementById('startBtn').addEventListener('click', startSinging);
            document.getElementById('pauseBtn').addEventListener('click', pauseSinging);
            document.getElementById('stopBtn').addEventListener('click', stopSinging);
            document.getElementById('cheerBtn').addEventListener('click', giveCheer);
            document.getElementById('backHomeBtn').addEventListener('click', () => {
                window.location.href = 'happy_voices_home.html';
            });
            
            // Add keyboard shortcuts
            document.addEventListener('keydown', function(e) {
                switch(e.code) {
                    case 'Space':
                        e.preventDefault();
                        if (isPlaying) pauseSinging();
                        else startSinging();
                        break;
                    case 'KeyC':
                        giveCheer();
                        break;
                    case 'Escape':
                        stopSinging();
                        break;
                }
            });
        });

        // Add CSS animations for messages
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            
            @keyframes slideOut {
                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(100%); opacity: 0; }
            }
            
            @keyframes particleBurst {
                0% { 
                    transform: translate(-50%, -50%) scale(0);
                    opacity: 1;
                }
                100% { 
                    transform: translate(-50%, -50%) scale(1) translate(
                        ${Math.random() * 200 - 100}px, 
                        ${Math.random() * 200 - 100}px
                    );
                    opacity: 0;
                }
            }
            
            @keyframes progressShine {
                0% { transform: translateX(-100%); }
                100% { transform: translateX(100%); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
